targets:
  MUN-01-SC598_EZKIT-01:
    resources:
      RemotePlace:
        name: "MUN-01-SC598_EZKIT-01"
      NetworkService:
        address: "adi-lf-test"
    drivers:
      - SerialDriver:
          name: serial
          bindings:
            port: console

      - NetworkPowerDriver:
          name: power
          bindings:
            port: power

      - GpioDigitalOutputDriver:
          name: spi_boot
          bindings:
            gpio: boot-mode

      - OpenOCDDriver:
          load_commands:
            - "source [find interface/adi-dbgagent.cfg]"
            - "source [find target/adspsc59x_a55.cfg]"
            - "source [find /tools/u-boot.tcl]"
            - "init"
            - "autoboot_elf"
            - "shutdown"

  MUN-01-SC598_EZKIT-02:
    resources:
      RemotePlace:
        name: "MUN-01-SC598_EZKIT-02"
      NetworkService:
        address: "adi-lf-test"

    drivers:
      NetworkPowerDriver:
        name: "power"
      SerialDriver:
        name: "serial"
      OpenOCDDriver:
        load_commands:
          - "source [find interface/adi-dbgagent.cfg]"
          - "source [find target/adspsc59x_a55.cfg]"
          - "source [find /tools/u-boot.tcl]"
          - "init"
          - "autoboot_elf"
          - "shutdown"

  MUN-01-SC573_EZLITE-01:
    resources:
      RemotePlace:
        name: "MUN-01-SC573_EZLITE-01"
      NetworkService:
        address: "adi-lf-test.local"
        
    drivers:
      NetworkPowerDriver:
        name: "power"
      SerialDriver:
        name: "serial"
      OpenOCDDriver:
        load_commands:
          - "source [find interface/ice1000.cfg]"
          - "source [find target/adspsc57x.cfg]"
          - "source [find /tools/u-boot.tcl]"
          - "init"
          - "autoboot_elf"
          - "shutdown"
